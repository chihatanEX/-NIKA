<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 株式会社NIKA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 1. ベース・ヘッダー --- */
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            margin: 0; color: #333; background-color: #fcfdfe; line-height: 1.8;
        }

        header {
            background: #fff; padding: 15px 8%;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #f0f4f8; position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-weight: bold; font-size: 1.6rem; color: #0077b6; text-decoration: none; z-index: 1200; }
        
        nav { display: flex; align-items: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #444; font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
        nav a:hover { color: #00b4d8; }

        .nav-contact { 
            background: #0077b6; color: #fff !important; padding: 10px 25px; border-radius: 50px; 
            margin-left: 10px; transition: 0.3s; text-decoration: none;
        }

        /* ハンバーガーメニューボタン */
        .menu-btn { display: none; cursor: pointer; z-index: 1200; font-size: 1.6rem; color: #0077b6; }

        /* スマホ用オーバーレイ */
        .menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.6); z-index: 1050; opacity: 0; transition: 0.3s; pointer-events: none;
        }

        /* --- 2. ページヒーロー --- */
        .page-hero {
            background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            color: #fff; padding: 100px 8%; text-align: center;
            box-sizing: border-box;
        }
        .page-hero h1 { margin: 0; font-size: 2.2rem; letter-spacing: 0.1em; font-weight: 800; text-transform: uppercase; }
        .page-hero p { margin: 10px 0 0; font-size: 1.1rem; opacity: 0.9; }

        /* --- 3. コンテナ・フォームカード --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 5%; box-sizing: border-box; }

        .contact-card {
            background: #fff; padding: 60px 20px; border-radius: 15px;
            border: 1px solid #eef2f6; box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            margin: 0 auto;
        }
        .form-intro { text-align: center; margin-bottom: 40px; color: #666; font-size: 1.05rem; }

        /* Googleフォーム埋め込みエリア */
        .form-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .form-wrapper iframe {
            width: 100%;
            max-width: 760px; /* フォームの幅を制限して読みやすく */
            height: 1000px; /* フォームの長さに合わせて調整してください */
            border: none;
            background: transparent;
        }

        
        .bottom-nav { text-align: center; margin-top: 20px; padding-bottom: 80px; }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 10px; border: 2px solid #0077b6; 
            color: #0077b6; padding: 15px 60px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-outline:hover { background: #0077b6; color: #fff; transform: translateY(-2px); }


        /* ホーム戻るエリア */
        .page-back-footer { background-color: #f0f4f8; padding: 80px 8%; text-align: center; margin-top: 60px; }
        .btn-back-home {
            display: inline-flex; align-items: center; justify-content: center; gap: 12px;
            background: #fff; border: 2px solid #0077b6; color: #0077b6;
            padding: 18px 80px; border-radius: 50px; text-decoration: none;
            font-weight: bold; font-size: 1.1rem; transition: all 0.3s ease;
        }
        .btn-back-home:hover { background: #0077b6; color: #fff; transform: translateY(-3px); }

        footer { background: #fff; padding: 60px 0; text-align: center; border-top: 1px solid #eee; font-size: 0.85rem; color: #999; }

        /* --- 4. スマホレスポンシブ --- */
        @media (max-width: 768px) {
            header { padding: 12px 5%; }
            .menu-btn { display: block; }

            nav {
                position: fixed; top: -70vh; left: 0; width: 100%; height: 70vh;
                background: #ffffff; flex-direction: column; justify-content: center;
                align-items: center; padding: 40px 0; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
                z-index: 1100; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            }

            nav.active { top: 0; }
            .menu-overlay.active { display: block; opacity: 1; pointer-events: auto; }

            nav a {
                margin: 0; font-size: 1.25rem; font-weight: 700; color: #0077b6;
                width: 100%; text-align: center; padding: 20px 0; border-bottom: 1px solid #f0f4f8;
            }

            .nav-contact {
                background: #0077b6 !important; color: #fff !important;
                margin-top: 25px !important; border-radius: 50px !important;
                width: 75% !important; padding: 15px 0 !important;
            }

            .page-hero { padding: 80px 5%; }
            .page-hero h1 { font-size: 1.8rem; }
            
            .contact-card { padding: 40px 10px; }
            .form-wrapper iframe { height: 1200px; } /* スマホはフォームが縦に伸びるため高めに設定 */
            .btn-back-home { width: 100%; padding: 18px 0; box-sizing: border-box; }
            .page-back-footer { padding: 60px 5%; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="logo">株式会社NIKA</a>
    
    <div class="menu-btn" id="menuBtn">
        <i class="fas fa-bars"></i>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>

    <nav id="navMenu">
        <a href="../index.html">HOME</a>
        <a href="../company/company.html">会社情報</a>
        <a href="../service/service.html">サービス案内</a>
        <a href="../recruit/recruit.html">採用情報</a>
        <a href="contact.html" class="nav-contact">お問い合わせ</a>
    </nav>
</header>

<section class="page-hero">
    <h1>CONTACT</h1>
    <p>お問い合わせ・お見積り</p>
</section>

<div class="container">
    <div class="contact-card">
        <p class="form-intro">
            ご相談・お見積りは無料で承っております。<br>
            以下のフォームに必要事項をご記入の上、送信してください。
        </p>

        <div class="form-wrapper">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd55wraC_YqqkxqwZL6Xq9S9KEO5UfAPYL-1AvKTjcTNUuZjA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
        </div>
    </div>
</div>

    <div class="bottom-nav">
        <a href="../index.html" class="btn-outline">
            <i class="fas fa-arrow-left"></i> TOPページへ戻る
        </a>
    </div>

<footer>
    <p>&copy; 2026 株式会社NIKA. All Rights Reserved.</p>
</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navMenu = document.getElementById('navMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const navLinks = document.querySelectorAll('nav a');

    function toggleMenu() {
        navMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        
        if (navMenu.classList.contains('active')) {
            icon.classList.replace('fa-bars', 'fa-times');
            document.body.style.overflow = 'hidden';
        } else {
            icon.classList.replace('fa-times', 'fa-bars');
            document.body.style.overflow = '';
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (navMenu.classList.contains('active')) toggleMenu();
        });
    });
</script>

</body>
</html>
