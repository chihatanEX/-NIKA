<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 株式会社NIKA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. ベース設定 --- */
        body { 
            font-family: "Noto Sans JP", "Helvetica Neue", Arial, sans-serif; 
            margin: 0; color: #333; background-color: #fcfdfe; line-height: 1.8; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* --- 2. ヘッダー (他ページと共通) --- */
        header { 
            background: #fff; padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #f0f4f8; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 700; font-size: 1.6rem; color: #0077b6; text-decoration: none; z-index: 1200; }

        nav { display: flex; align-items: center; }
        nav a { 
            font-family: "Helvetica Neue", Arial, sans-serif;
            margin: 0 15px; text-decoration: none; color: #444; font-weight: 600; font-size: 0.95rem; transition: 0.3s; 
        }
        nav a:hover { color: #00b4d8; }

        .nav-contact { 
            background: #0077b6; color: #fff !important; padding: 10px 25px; border-radius: 50px; 
            margin-left: 10px; transition: 0.3s; text-decoration: none;
        }

        .menu-btn { display: none; cursor: pointer; z-index: 1200; font-size: 1.6rem; color: #0077b6; }
        .menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.6); z-index: 1050; opacity: 0; transition: 0.3s; pointer-events: none;
        }

        /* --- 3. ヒーローエリア (コンパクトに統一) --- */
        .page-hero {
            background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            color: #fff; 
            padding: 60px 8%; 
            text-align: center;
        }
        .page-hero h1 { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            font-size: 2.0rem; 
            letter-spacing: 0.1em; 
            font-weight: 800; 
        }
        .page-hero p { 
            margin: 5px 0 0; 
            font-size: 1.0rem; 
            font-weight: 500; 
            opacity: 0.9; 
            letter-spacing: 0.2em;
        }

        /* --- 4. コンテンツエリア --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 5%; box-sizing: border-box; }

        .contact-card {
            background: #fff; padding: 50px 20px; border-radius: 15px;
            border: 1px solid #eef2f6; box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            margin: 0 auto;
        }
        .form-intro { 
            text-align: center; margin-bottom: 40px; color: #555; font-size: 1.0rem; 
            font-weight: 500; line-height: 2;
        }

        /* Googleフォーム埋め込み */
        .form-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .form-wrapper iframe {
            width: 100%;
            max-width: 760px;
            height: 1000px; /* 必要に応じて調整 */
            border: none;
            background: transparent;
        }

        /* --- 5. 戻るボタン --- */
        .bottom-nav { text-align: center; margin-top: 40px; padding-bottom: 80px; }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 10px; border: 2px solid #0077b6; 
            color: #0077b6; padding: 15px 60px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-outline:hover { background: #0077b6; color: #fff; transform: translateY(-2px); }

        footer { background: #fff; padding: 60px 0; text-align: center; border-top: 1px solid #eee; font-size: 0.85rem; color: #999; }

        /* --- 6. スマホレスポンシブ --- */
        @media (max-width: 768px) {
            header { padding: 12px 5%; }
            .logo { font-size: 1.3rem; }
            .menu-btn { display: block; }

            nav {
                position: fixed; top: -100vh; left: 0; width: 100%; height: auto;
                background: #ffffff; flex-direction: column; padding: 60px 0 40px; 
                z-index: 1100; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                transition: 0.4s ease-in-out;
            }

            nav.active { top: 0; }
            .menu-overlay.active { display: block; opacity: 1; pointer-events: auto; }

            nav a {
                margin: 0; font-size: 1.1rem; width: 100%; text-align: center; padding: 15px 0; border-bottom: 1px solid #f0f4f8;
            }

            .nav-contact { width: 80% !important; margin: 20px auto 0 !important; }

            .page-hero { padding: 40px 5%; }
            .page-hero h1 { font-size: 1.6rem; }
            
            .container { padding: 40px 5% 20px; }
            .contact-card { padding: 30px 10px; }
            .form-wrapper iframe { height: 1200px; }
            .btn-outline { width: 100%; box-sizing: border-box; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="logo">株式会社NIKA</a>
    <div class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></div>
    <div class="menu-overlay" id="menuOverlay"></div>
    <nav id="navMenu">
        <a href="../index.html">HOME</a>
        <a href="../company/company.html">会社情報</a>
        <a href="../service/service.html">事業内容</a>
        <a href="../recruit/recruit.html">採用情報</a>
        <a href="contact.html" class="nav-contact">お問い合わせ</a>
    </nav>
</header>

<section class="page-hero">
    <h1>CONTACT</h1>
    <p>お問い合わせ・お見積り</p>
</section>

<div class="container">
    <div class="contact-card">
        <p class="form-intro">
            ご相談・お見積りは無料で承っております。<br>
            以下のフォームに必要事項をご記入の上、送信してください。<br>
            通常、2〜3営業日以内に担当よりご連絡差し上げます。
        </p>

        <div class="form-wrapper">
            <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd55wraC_YqqkxqwZL6Xq9S9KEO5UfAPYL-1AvKTjcTNUuZjA/viewform?embedded=true" frameborder="0" marginheight="0" marginwidth="0">読み込んでいます…</iframe>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="../index.html" class="btn-outline">
            <i class="fas fa-arrow-left"></i> TOPページへ戻る
        </a>
    </div>
</div>

<footer>
    <p>© 2026 株式会社NIKA. All Rights Reserved.</p>
</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navMenu = document.getElementById('navMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const navLinks = document.querySelectorAll('nav a');

    function toggleMenu() {
        navMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        if (navMenu.classList.contains('active')) {
            icon.classList.replace('fa-bars', 'fa-times');
            document.body.style.overflow = 'hidden';
        } else {
            icon.classList.replace('fa-times', 'fa-bars');
            document.body.style.overflow = '';
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (navMenu.classList.contains('active')) toggleMenu();
        });
    });
</script>

</body>
</html>
