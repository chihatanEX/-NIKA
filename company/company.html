<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社情報 | 株式会社NIKA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 1. ベース・ヘッダー（全ページ完全統一） --- */
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
            margin: 0; color: #333; background-color: #ffffff; line-height: 1.8; 
        }
        
        header { 
            background: #fff; padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #f0f4f8; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: bold; font-size: 1.6rem; color: #0077b6; text-decoration: none; z-index: 1200; }

        nav { display: flex; align-items: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #444; font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
        nav a:hover { color: #00b4d8; }

        .nav-contact { 
            background: #0077b6; color: #fff !important; padding: 10px 25px; border-radius: 50px; 
            margin-left: 10px; transition: 0.3s; text-decoration: none;
        }

        /* スマホ用ボタン */
        .menu-btn {
            display: none;
            cursor: pointer;
            z-index: 1200;
            font-size: 1.6rem;
            color: #0077b6;
        }

        /* スマホ用暗幕 */
        .menu-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1050;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        /* --- 2. ヒーローエリア --- */
        .page-hero {
            background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            color: #fff; padding: 100px 8%; text-align: center;
        }
        .page-hero h1 { margin: 0; font-size: 2.2rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .page-hero p { margin: 10px 0 0; font-size: 1.1rem; opacity: 0.9; }

        /* --- 3. コンテナ・テーブル --- */
        .container { max-width: 900px; margin: 0 auto; padding: 80px 8%; }

        .company-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .company-table th, .company-table td { 
            padding: 25px 20px; border-bottom: 1px solid #eee; text-align: left; 
        }
        .company-table th { width: 30%; color: #0077b6; font-weight: bold; font-size: 1rem; }
        .company-table td { color: #444; font-size: 1rem; }

        /* --- 4. アクセス/地図 --- */
        .map-area { margin-top: 80px; text-align: center; }
        .map-area h2 { color: #0077b6; margin-bottom: 30px; font-size: 1.8rem; }
        .map-placeholder { 
            background: #f0f7fa; height: 400px; border-radius: 15px; border: 1px solid #e1ecf2;
            display: flex; align-items: center; justify-content: center; color: #9ab4c1; font-weight: bold;
        }

        .back-area { text-align: center; margin-top: 60px; }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 10px; border: 2px solid #0077b6; 
            color: #0077b6; padding: 15px 60px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-outline:hover { background: #0077b6; color: #fff; }

        footer { padding: 60px 0; text-align: center; border-top: 1px solid #eee; font-size: 0.85rem; color: #999; }

        /* --- 5. スマホ調整（ハンバーガーメニュー実装） --- */
        @media (max-width: 768px) {
            header { padding: 12px 5%; }
            .menu-btn { display: block; }

            nav {
                position: fixed;
                top: -70vh;
                left: 0;
                width: 100%;
                height: 70vh;
                background: #ffffff;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 40px 0;
                transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
                z-index: 1100;
                box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            }

            nav.active { top: 0; }
            .menu-overlay.active { display: block; opacity: 1; pointer-events: auto; }

            nav a {
                margin: 0; font-size: 1.25rem; font-weight: 700; color: #0077b6;
                width: 100%; text-align: center; padding: 20px 0; border-bottom: 1px solid #f0f4f8;
            }

            .nav-contact {
                background: #0077b6 !important; color: #fff !important;
                margin-top: 25px !important; border-radius: 50px !important;
                border-bottom: none !important; width: 75% !important;
                padding: 15px 0 !important; box-shadow: 0 4px 15px rgba(0, 119, 182, 0.3);
            }

            .container { padding: 40px 5%; }
            .company-table th, .company-table td { display: block; width: 100%; padding: 15px 10px; }
            .company-table th { border-bottom: none; padding-bottom: 0; color: #00b4d8; }
            
            .btn-outline { width: 100%; box-sizing: border-box; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="logo">株式会社NIKA</a>
    
    <div class="menu-btn" id="menuBtn">
        <i class="fas fa-bars"></i>
    </div>

    <div class="menu-overlay" id="menuOverlay"></div>

    <nav id="navMenu">
        <a href="../index.html">HOME</a>
        <a href="company.html">会社情報</a>
        <a href="../service/service.html">サービス案内</a>
        <a href="#">施工事例</a>
        <a href="../contact/contact.html" class="nav-contact">お問い合わせ</a>
    </nav>
</header>

<section class="page-hero">
    <h1>COMPANY</h1>
    <p>会社情報</p>
</section>

<div class="container">
    <table class="company-table">
        <tr>
            <th>会社名</th>
            <td>株式会社NIKA</td>
        </tr>
        <tr>
            <th>代表者</th>
            <td>（代表者名をご入力ください）</td>
        </tr>
        <tr>
            <th>所在地</th>
            <td>（本社住所をご入力ください）</td>
        </tr>
        <tr>
            <th>設立</th>
            <td>（設立年月日をご入力ください）</td>
        </tr>
        <tr>
            <th>事業内容</th>
            <td>
                エアコン設置・清掃事業<br>
                ハウスクリーニング事業<br>
                建設事業（足場・リフォーム）
            </td>
        </tr>
    </table>

    <div class="map-area">
        <h2>ACCESS</h2>
        <div class="map-placeholder">
            <i class="fas fa-map-marker-alt" style="font-size: 3rem; margin-right: 15px; opacity: 0.3;"></i>
            <span>Google Map 埋め込みエリア</span>
        </div>
    </div>

    <div class="back-area">
        <a href="../index.html" class="btn-outline">
            <i class="fas fa-chevron-left"></i> ホームへ戻る
        </a>
    </div>
</div>

<footer>
    <p>&copy; 2026 株式会社NIKA. All Rights Reserved.</p>
</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navMenu = document.getElementById('navMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const navLinks = document.querySelectorAll('nav a');

    function toggleMenu() {
        navMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        
        if (navMenu.classList.contains('active')) {
            icon.classList.replace('fa-bars', 'fa-times');
            document.body.style.overflow = 'hidden';
        } else {
            icon.classList.replace('fa-times', 'fa-bars');
            document.body.style.overflow = '';
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);

    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (navMenu.classList.contains('active')) toggleMenu();
        });
    });
</script>

</body>
</html>
