<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社情報 | 株式会社NIKA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. ベース設定 --- */
        body { 
            font-family: "Noto Sans JP", sans-serif; 
            margin: 0; color: #333; background-color: #fcfdfe; line-height: 1.8; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* --- 2. ヘッダー (トップページと完全に一致) --- */
        header { 
            background: #fff; padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #f0f4f8; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: 700; font-size: 1.4rem; color: #0077b6; text-decoration: none; }

        nav { display: flex; align-items: center; }
        nav a { 
            margin: 0 12px; 
            text-decoration: none; 
            color: #444; 
            font-weight: 600; 
            font-size: 0.9rem; 
            transition: 0.3s; 
        }
        /* マウスをかざすとオレンジ */
        nav a:hover { color: #f39c12; }

        .nav-contact { 
            background: #f39c12; 
            color: #fff !important; 
            padding: 8px 25px; 
            border-radius: 50px; 
            margin-left: 10px; 
            transition: 0.3s !important;
        }
        .nav-contact:hover { opacity: 0.8; color: #fff !important; }

        .menu-btn { display: none; cursor: pointer; font-size: 1.5rem; color: #0077b6; }
        .menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.6); z-index: 1050; opacity: 0; transition: 0.3s; pointer-events: none;
        }

        /* --- 3. ヒーローエリア --- */
        .page-hero {
            background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            color: #fff; 
            padding: 60px 8%; 
            text-align: center;
        }
        .page-hero h1 { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            font-size: 2.0rem; 
            letter-spacing: 0.1em; 
            font-weight: 800; 
        }
        .page-hero p { 
            margin: 5px 0 0; 
            font-size: 1.0rem; 
            font-weight: 700; 
            opacity: 0.9; 
            letter-spacing: 0.2em;
        }

        /* --- 4. コンテンツ・PCでワイド表示 --- */
        .container { 
            max-width: 1400px; /* 横幅いっぱいに広げる */
            margin: 0 auto; 
            padding: 60px 8% 20px; 
            box-sizing: border-box; 
        }

        .content-card {
            background: #fff; padding: 50px; border-radius: 15px;
            border: 1px solid #eef2f6; box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            margin-bottom: 60px;
        }

        h2 { 
            text-align: left; color: #0077b6; font-size: 1.8rem; margin-bottom: 30px; 
            position: relative; padding-bottom: 15px; font-weight: 800;
        }
        h2::after { 
            content: ""; position: absolute; bottom: 0; left: 0; width: 50px; height: 3px; background: #00b4d8; 
        }

        .company-table { width: 100%; border-collapse: collapse; }
        .company-table th, .company-table td { 
            padding: 22px 15px; border-bottom: 1px solid #f0f4f8; text-align: left; 
        }
        .company-table th { 
            width: 20%; 
            color: #0077b6; font-weight: 700; font-size: 1.05rem; vertical-align: top;
        }
        .company-table td { color: #444; font-size: 1.05rem; font-weight: 500; }
        /* 差し色：項目の横にオレンジの点 */
        .company-table th::before {
            content: "●"; color: #f39c12; font-size: 0.6rem; margin-right: 8px; vertical-align: middle;
        }
        .company-table tr:last-child th, .company-table tr:last-child td { border-bottom: none; }

        /* --- 5. アクセス/地図 (ワイド表示) --- */
        .map-wrapper {
            position: relative;
            padding-bottom: 40%; /* 横長に表示 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            border: 1px solid #e1ecf2;
            background: #f4f9fc;
        }
        .map-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: 0;
        }

        /* --- 6. 戻るボタン --- */
        .cta-area { text-align: center; margin-top: 20px; padding-bottom: 80px; }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 10px; border: 2px solid #0077b6; 
            color: #0077b6; padding: 15px 60px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-outline:hover { background: #0077b6; color: #fff; transform: translateY(-2px); }

        footer { background: #fff; padding: 60px 0; text-align: center; border-top: 1px solid #eee; font-size: 0.8rem; color: #999; }

        /* --- 7. スマホレスポンシブ --- */
        @media (max-width: 768px) {
            header { padding: 12px 5%; }
            .logo { font-size: 1.4rem; }
            .menu-btn { display: block; }

            nav {
                position: fixed; top: -100vh; left: 0; width: 100%; height: auto;
                background: #ffffff; flex-direction: column; padding: 60px 0 40px; 
                z-index: 1100; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
                transition: 0.4s ease-in-out;
            }

            nav.active { top: 0; }
            .menu-overlay.active { display: block; opacity: 1; pointer-events: auto; }

            nav a {
                margin: 0; font-size: 1.1rem; width: 100%; text-align: center; padding: 15px 0; border-bottom: 1px solid #f9f9f9;
            }
            nav a:hover { color: #f39c12; }

            .nav-contact { width: 80% !important; margin: 20px auto 0 !important; }

            .page-hero { padding: 40px 5%; }
            .page-hero h1 { font-size: 1.6rem; }

            .container { padding: 40px 5% 20px; }
            .content-card { padding: 30px 20px; margin-bottom: 40px; }

            .company-table th, .company-table td { display: block; width: 100%; padding: 12px 0; }
            .company-table th { border-bottom: none; padding-bottom: 0; font-size: 0.95rem; color: #00b4d8; }
            .company-table th::before { display: none; }
            .company-table td { padding-bottom: 15px; border-bottom: 1px solid #f0f4f8; }

            .map-wrapper { padding-bottom: 75%; }
            .btn-outline { width: 100%; box-sizing: border-box; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="logo">株式会社NIKA</a>
    <div class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></div>
    <div class="menu-overlay" id="menuOverlay"></div>
    <nav id="navMenu">
        <a href="../index.html">HOME</a>
        <a href="company.html">会社情報</a>
        <a href="../service/service.html">事業内容</a>
        <a href="../recruit/recruit.html">採用情報</a>
        <a href="../contact/contact.html" class="nav-contact">お問い合わせ</a>
    </nav>
</header>

<section class="page-hero">
    <h1>COMPANY</h1>
    <p>会社情報</p>
</section>

<div class="container">
    <div class="content-card">
        <h2>会社概要</h2>
        <table class="company-table">
            <tr>
                <th>会社名</th>
                <td>株式会社NIKA</td>
            </tr>
            <tr>
                <th>代表者</th>
                <td>佐久間 亮太</td>
            </tr>
            <tr>
                <th>所在地</th>
                <td>〒264-0004<br>千葉県千葉市若葉区桜木北2-26-43</td>
            </tr>
            <tr>
                <th>設立</th>
                <td>2026年3月5日</td>
            </tr>
            <tr>
                <th>電話番号</th>
                <td>XXX-XXXX-XXXX（準備中）</td>
            </tr>
            <tr>
                <th>FAX</th>
                <td>043-331-2345</td>
            </tr>                                     
            <tr>
                <th>事業内容</th>
                <td>
                    エアコン設置・清掃事業<br>
                    ハウスクリーニング事業<br>
                    建設サポート事業（美装・養生・雑工）
                </td>
            </tr>
        </table>
    </div>

    <div class="content-card">
        <h2>アクセス</h2>
        <div class="map-area">
            <div class="map-wrapper">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3243.6190547704!2d140.16017007625126!3d35.61330393375837!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x602290455018652d%3A0xc682944b7d5904d9!2z44CSMjY0LTAwMDQg5Y2D6JGJ55yM5Y2D6JGJ5biC6Iul6JGJ5Yy65qGc5pyo5YyX77yS5LiB55uu77prefix77yU77yT!5e0!3m2!1sja!2sjp!4v1709600000000!5m2!1sja!2sjp" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>

    <div class="cta-area">
        <a href="../index.html" class="btn-outline">
            <i class="fas fa-arrow-left"></i> TOPページへ戻る
        </a>
    </div>
</div>

<footer>
    <p>&copy; 2026 株式会社NIKA. All Rights Reserved.</p>
</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navMenu = document.getElementById('navMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const navLinks = document.querySelectorAll('nav a');

    function toggleMenu() {
        navMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        if (navMenu.classList.contains('active')) {
            icon.classList.replace('fa-bars', 'fa-times');
            document.body.style.overflow = 'hidden';
        } else {
            icon.classList.replace('fa-times', 'fa-bars');
            document.body.style.overflow = '';
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (navMenu.classList.contains('active')) toggleMenu();
        });
    });
</script>

</body>
</html>
