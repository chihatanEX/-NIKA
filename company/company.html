<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社情報 | 株式会社NIKA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* --- 1. ベース設定 --- */
        body { 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
            margin: 0; color: #333; background-color: #fcfdfe; line-height: 1.8; 
        }
        
        /* --- 2. ヘッダー --- */
        header { 
            background: #fff; padding: 15px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 2px solid #f0f4f8; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-weight: bold; font-size: 1.6rem; color: #0077b6; text-decoration: none; z-index: 1200; }

        nav { display: flex; align-items: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #444; font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
        nav a:hover { color: #00b4d8; }

        .nav-contact { 
            background: #0077b6; color: #fff !important; padding: 10px 25px; border-radius: 50px; 
            margin-left: 10px; transition: 0.3s; text-decoration: none;
        }

        .menu-btn { display: none; cursor: pointer; z-index: 1200; font-size: 1.6rem; color: #0077b6; }
        .menu-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.6); z-index: 1050; opacity: 0; transition: 0.3s; pointer-events: none;
        }

        /* --- 3. ヒーローエリア（他ページと完全統一） --- */
        .page-hero {
            background: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            color: #fff;
            padding: 100px 8%; 
            text-align: center;
            box-sizing: border-box;
        }
        .page-hero h1 { 
            margin: 0; font-size: 2.2rem; letter-spacing: 0.1em; font-weight: 800; text-transform: uppercase;
        }
        .page-hero p { 
            margin: 10px 0 0; font-size: 1.1rem; opacity: 0.9; font-weight: 500;
        }

        /* --- 4. コンテンツ・カード --- */
        .container { max-width: 1000px; margin: 0 auto; padding: 60px 8% 20px; box-sizing: border-box; }

        .content-card {
            background: #fff; padding: 50px; border-radius: 15px;
            border: 1px solid #eef2f6; box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            margin-bottom: 60px;
        }

        h2 { 
            text-align: left; color: #0077b6; font-size: 1.8rem; margin-bottom: 30px; 
            position: relative; padding-bottom: 15px; 
        }
        h2::after { 
            content: ""; position: absolute; bottom: 0; left: 0; width: 50px; height: 3px; background: #00b4d8; 
        }

        .company-table { width: 100%; border-collapse: collapse; }
        .company-table th, .company-table td { 
            padding: 22px 15px; border-bottom: 1px solid #f0f4f8; text-align: left; 
        }
        .company-table th { 
            width: 25%; color: #0077b6; font-weight: bold; font-size: 1.05rem; vertical-align: top;
        }
        .company-table td { color: #444; font-size: 1.05rem; }
        .company-table tr:last-child th, .company-table tr:last-child td { border-bottom: none; }

        /* --- 5. アクセス/地図 --- */
        .map-area { margin-top: 20px; }
        .map-placeholder { 
            background: #f4f9fc; height: 400px; border-radius: 20px; border: 1px solid #e1ecf2;
            display: flex; align-items: center; justify-content: center; color: #9ab4c1; font-weight: bold;
        }

        /* --- 6. 戻るボタン --- */
        .cta-area { text-align: center; margin-top: 40px; padding-bottom: 80px; }
        .btn-outline {
            display: inline-flex; align-items: center; gap: 10px; border: 2px solid #0077b6; 
            color: #0077b6; padding: 15px 60px; border-radius: 50px; text-decoration: none; font-weight: bold; transition: 0.3s;
        }
        .btn-outline:hover { background: #0077b6; color: #fff; transform: translateY(-2px); }

        footer { background: #fff; padding: 60px 0; text-align: center; border-top: 1px solid #eee; font-size: 0.85rem; color: #999; }

        /* --- 7. スマホレスポンシブ --- */
        @media (max-width: 768px) {
            header { padding: 12px 5%; }
            .menu-btn { display: block; }

            nav {
                position: fixed; top: -70vh; left: 0; width: 100%; height: 70vh;
                background: #ffffff; flex-direction: column; justify-content: center;
                align-items: center; padding: 40px 0; transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
                z-index: 1100; box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            }

            nav.active { top: 0; }
            .menu-overlay.active { display: block; opacity: 1; pointer-events: auto; }

            nav a {
                margin: 0; font-size: 1.25rem; font-weight: 700; color: #0077b6;
                width: 100%; text-align: center; padding: 20px 0; border-bottom: 1px solid #f0f4f8;
            }

            .nav-contact {
                background: #0077b6 !important; color: #fff !important;
                margin-top: 25px !important; border-radius: 50px !important;
                width: 75% !important; padding: 15px 0 !important;
            }

            .page-hero { padding: 80px 5%; }
            .page-hero h1 { font-size: 1.8rem; }

            .company-table th, .company-table td { display: block; width: 100%; padding: 12px 0; }
            .company-table th { border-bottom: none; padding-bottom: 0; font-size: 1rem; color: #00b4d8; }
            .company-table td { padding-bottom: 15px; }

            .map-placeholder { height: 300px; }
            .btn-outline { width: 100%; box-sizing: border-box; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <a href="../index.html" class="logo">株式会社NIKA</a>
    <div class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></div>
    <div class="menu-overlay" id="menuOverlay"></div>
    <nav id="navMenu">
        <a href="../index.html">HOME</a>
        <a href="company.html">会社情報</a>
        <a href="../service/service.html">事業内容</a>
        <a href="../recruit/recruit.html">採用情報</a>
        <a href="../contact/contact.html" class="nav-contact">お問い合わせ</a>
    </nav>

                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3242.808640415878!2d140.15629487484932!3d35.63244373265407!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x60228539a2bb1a97%3A0x9c9ce86955bca0a1!2z44CSMjY0LTAwMjkg5Y2D6JGJ55yM5Y2D6JGJ5biC6Iul6JGJ5Yy65qGc5pyo5YyX77yS5LiB55uu77yS77yW4oiS77yU77yT!5e0!3m2!1sja!2sjp!4v1773368224477!5m2!1sja!2sjp" width="650" height="350" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>
    </div>

    <div class="cta-area">

    </div>
</div>

<footer>

</footer>

<script>
    const menuBtn = document.getElementById('menuBtn');
    const navMenu = document.getElementById('navMenu');
    const menuOverlay = document.getElementById('menuOverlay');
    const navLinks = document.querySelectorAll('nav a');

    function toggleMenu() {
        navMenu.classList.toggle('active');
        menuOverlay.classList.toggle('active');
        const icon = menuBtn.querySelector('i');
        if (navMenu.classList.contains('active')) {
            icon.classList.replace('fa-bars', 'fa-times');
            document.body.style.overflow = 'hidden';
        } else {
            icon.classList.replace('fa-times', 'fa-bars');
            document.body.style.overflow = '';
        }
    }

    menuBtn.addEventListener('click', toggleMenu);
    menuOverlay.addEventListener('click', toggleMenu);
    navLinks.forEach(link => {
        link.addEventListener('click', () => {
            if (navMenu.classList.contains('active')) toggleMenu();
        });
    });
</script>

</body>
</html>
